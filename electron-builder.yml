appId: com.smartfile.app
productName: SmartFile
copyright: Copyright 2024 SmartFile Team

directories:
  buildResources: ../build
  output: ../release
  app: .

files:
  - from: ../dist/public
    to: dist/public
    filter: ["**/*"]
  - main.js
  - preload.js
  - package.json
  - node_modules/**/*

asar: true

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
  darkModeSupport: true
  gatekeeperAssess: false
  sign: false

dmg:
  title: SmartFile
  artifactName: SmartFile-${version}-${arch}.dmg
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  artifactName: SmartFile-${version}-Setup.exe

extraMetadata:
  main: main.js
